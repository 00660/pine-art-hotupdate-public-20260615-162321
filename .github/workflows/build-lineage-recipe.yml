name: Build LineageOS Docker boot image

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "LineageOS device codename. Used when recipe is empty."
        required: false
        default: "alioth"
      recipe:
        description: "Optional path to a build_ready recipe JSON, for example recipes/lineage/alioth.json"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve recipe
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_RECIPE: ${{ inputs.recipe }}
          INPUT_CODENAME: ${{ inputs.codename }}
        run: |
          if [ -n "$INPUT_RECIPE" ]; then
            echo "RECIPE_PATH=$INPUT_RECIPE" >> "$GITHUB_ENV"
          else
            LINEAGE_DEVICE="$INPUT_CODENAME" node scripts/lineage-xiaomi-catalog.mjs
            echo "RECIPE_PATH=recipes/lineage/$INPUT_CODENAME.json" >> "$GITHUB_ENV"
          fi

      - name: Build Docker-capable boot image
        run: |
          chmod +x scripts/build-lineage-recipe.sh
          scripts/build-lineage-recipe.sh "$RECIPE_PATH"

      - name: Prepare release assets
        run: |
          chmod +x scripts/prepare-lineage-release.sh
          scripts/prepare-lineage-release.sh artifacts/lineage-recipe

      - name: Upload boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-docker-boot
          retention-days: 1
          path: |
            artifacts/lineage-recipe/release/*
            artifacts/lineage-recipe/release.env
          if-no-files-found: error

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          . artifacts/lineage-recipe/release.env
          ASSETS=(
            "$RELEASE_DIR/$BOOT_ASSET"
            "$RELEASE_DIR/$SHA_ASSET"
            "$RELEASE_DIR/$CONFIG_ASSET"
            "$RELEASE_DIR/$RECIPE_ASSET"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest=false
          fi
