name: Build all ready LineageOS vendor boot images

on:
  workflow_dispatch:
    inputs:
      vendors:
        description: "Optional comma-separated vendor_short values. Empty builds every vendor in the catalog."
        required: false
        default: ""
      devices:
        description: "Optional comma-separated codenames or vendor_short/codename entries."
        required: false
        default: ""
      max_parallel:
        description: "Maximum parallel build jobs for this workflow run."
        required: false
        default: "3"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix
        id: matrix
        env:
          INPUT_VENDORS: ${{ github.event.inputs.vendors || '' }}
          INPUT_DEVICES: ${{ github.event.inputs.devices || '' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const recipes = JSON.parse(fs.readFileSync('catalog/lineage-vendors-recipes.json', 'utf8')).recipes;
          const supportedArchitectures = new Set(['arm64']);
          const slugify = (value) =>
            String(value || '')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '');
          const parseSet = (value) =>
            new Set(
              String(value || '')
                .split(',')
                .map((item) => item.trim())
                .filter(Boolean),
            );
          const requestedVendors = parseSet(process.env.INPUT_VENDORS);
          const requestedDevices = parseSet(process.env.INPUT_DEVICES);
          const publicModel = (recipe) => {
            const names = Array.from(new Set((recipe.source_facts?.names || []).filter(Boolean)));
            return names.join(' ') || recipe.build.device;
          };
          const matchesDevice = (recipe) => {
            if (requestedDevices.size === 0) return true;
            const key = `${recipe.build.vendor_short}/${recipe.build.device}`;
            return requestedDevices.has(recipe.build.device) || requestedDevices.has(key);
          };
          const ready = recipes
            .filter((recipe) => recipe.status === 'build_ready')
            .filter((recipe) => supportedArchitectures.has(recipe.build.arch))
            .filter((recipe) => requestedVendors.size === 0 || requestedVendors.has(recipe.build.vendor_short))
            .filter(matchesDevice)
            .map((recipe) => {
              const model = publicModel(recipe);
              return {
                device: recipe.build.device,
                vendor: recipe.build.vendor_short,
                model,
                model_slug: slugify(model) || recipe.build.device,
                recipe: `recipes/lineage-vendors/${recipe.build.vendor_short}/${recipe.build.device}.json`,
              };
            })
            .sort((a, b) => `${a.vendor}/${a.device}`.localeCompare(`${b.vendor}/${b.device}`));
          if (requestedVendors.size > 0) {
            const found = new Set(ready.map((item) => item.vendor));
            const missing = Array.from(requestedVendors).filter((vendor) => !found.has(vendor));
            if (missing.length) {
              console.error(`Requested vendors have no build_ready arm64 recipes: ${missing.join(', ')}`);
              process.exit(1);
            }
          }
          if (requestedDevices.size > 0) {
            const found = new Set(ready.flatMap((item) => [item.device, `${item.vendor}/${item.device}`]));
            const missing = Array.from(requestedDevices).filter((device) => !found.has(device));
            if (missing.length) {
              console.error(`Requested devices are not build_ready arm64 recipes: ${missing.join(', ')}`);
              process.exit(1);
            }
          }
          if (ready.length > 250) {
            console.error(`Refusing to create ${ready.length} matrix jobs. Use the vendors or devices input to split the run.`);
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify({ include: ready })}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `count=${ready.length}\n`);
          console.log(`build_ready_count=${ready.length}`);
          console.log(ready.map((item) => `${item.vendor}/${item.device} ${item.model}`).join('\n'));
          NODE

  build:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '3') }}
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build ${{ matrix.model }}
        run: |
          chmod +x scripts/build-lineage-recipe.sh
          scripts/build-lineage-recipe.sh "${{ matrix.recipe }}"

      - name: Prepare ${{ matrix.model }} release assets
        run: |
          chmod +x scripts/prepare-lineage-release.sh
          scripts/prepare-lineage-release.sh artifacts/lineage-recipe

      - name: Upload ${{ matrix.model }} boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-docker-boot-${{ matrix.model_slug }}
          path: |
            artifacts/lineage-recipe/release/*
            artifacts/lineage-recipe/release.env
          if-no-files-found: error

      - name: Publish ${{ matrix.model }} release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          . artifacts/lineage-recipe/release.env
          ASSETS=(
            "$RELEASE_DIR/$BOOT_ASSET"
            "$RELEASE_DIR/$SHA_ASSET"
            "$RELEASE_DIR/$CONFIG_ASSET"
            "$RELEASE_DIR/$RECIPE_ASSET"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest=false
          fi
