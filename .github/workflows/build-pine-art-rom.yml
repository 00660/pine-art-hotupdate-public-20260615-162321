name: Build pine Android 12 ART hot update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      manifest_url:
        description: Android manifest URL for ART hot update build.
        required: false
        default: https://android.googlesource.com/platform/manifest
      manifest_branch:
        description: Android manifest branch/tag matching pine Android 12 ART.
        required: false
        default: android-12.0.0_r32
      lunch_target:
        description: Lunch target used for ART module build.
        required: false
        default: aosp_arm64-user
      build_targets:
        description: Space-separated Soong targets to build.
        required: false
        default: com.android.art com.android.conscrypt
      sync_jobs:
        description: repo sync jobs.
        required: false
        default: "2"
      build_jobs:
        description: build jobs.
        required: false
        default: "1"
      add_swap:
        description: Add 8G swap before build. Set false only when disk pressure is worse than memory pressure.
        required: false
        default: "true"

permissions:
  contents: read

concurrency:
  group: pine-art-rom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pine-art-rom:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      USE_CCACHE: 0
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Free runner disk
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/share/swift \
            /opt/az \
            /opt/ghc \
            /opt/hostedtoolcache || true
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          fi
          sudo apt-get clean
          sudo docker system prune -af || true
          df -h

      - name: Install Android build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev \
            libelf-dev libgl1-mesa-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            python-is-python3 python3 python3-pip rsync schedtool squashfs-tools \
            unzip xsltproc zip zlib1g-dev
          sudo install -d -m 0755 /usr/local/bin
          curl -L --fail --retry 5 \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o /tmp/repo
          sudo install -m 0755 /tmp/repo /usr/local/bin/repo
          repo version

      - name: Add runner swap
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.add_swap == 'true' }}
        run: |
          set -euo pipefail
          sudo fallocate -l 8G /swapfile-extra || sudo dd if=/dev/zero of=/swapfile-extra bs=1M count=8192
          sudo chmod 600 /swapfile-extra
          sudo mkswap /swapfile-extra
          sudo swapon /swapfile-extra
          swapon --show
          free -h
          df -h

      - name: Sync Android 12 ART build tree
        timeout-minutes: 90
        env:
          MANIFEST_URL: ${{ inputs.manifest_url }}
          MANIFEST_BRANCH: ${{ inputs.manifest_branch }}
          SYNC_JOBS: ${{ inputs.sync_jobs }}
        run: |
          set -euo pipefail
          MANIFEST_URL="${MANIFEST_URL:-https://android.googlesource.com/platform/manifest}"
          MANIFEST_BRANCH="${MANIFEST_BRANCH:-android-12.0.0_r32}"
          SYNC_JOBS="${SYNC_JOBS:-2}"
          mkdir -p android
          cd android
          repo init -u "$MANIFEST_URL" -b "$MANIFEST_BRANCH" --depth=1
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch --prune -j"$SYNC_JOBS"
          repo manifest -r > ../pine-art-rom-resolved-manifest.xml
          git -C art rev-parse HEAD > ../pine-art-revision.txt

      - name: Apply pine ART, libcore, Conscrypt, and BoringSSL crypto patches
        run: |
          set -euo pipefail
          ART_PATCH="$PWD/devices/pine/patches/art/android-12.0.0_r32/pine-art-registerdexfile-dump.patch"
          LIBCORE_PATCH="$PWD/devices/pine/patches/art/android-12.0.0_r32/pine-libcore-crypto-dump.patch"
          CONSCRYPT_PATCH="$PWD/devices/pine/patches/art/android-12.0.0_r32/pine-conscrypt-crypto-dump.patch"
          BORINGSSL_PATCH="$PWD/devices/pine/patches/art/android-12.0.0_r32/pine-boringssl-crypto-dump.patch"
          git -C android/art apply --check "$ART_PATCH"
          git -C android/art apply "$ART_PATCH"
          git -C android/art diff --check
          grep -n "PineMaybeDumpRegisteredDexFile" android/art/runtime/class_linker.cc
          grep -n "debug.pine.art_dexdump" android/art/runtime/class_linker.cc
          git -C android/art diff > pine-art-rom-applied.diff
          git -C android/libcore apply --check "$LIBCORE_PATCH"
          git -C android/libcore apply "$LIBCORE_PATCH"
          git -C android/libcore diff --check
          grep -n "PineCryptoDump" android/libcore/ojluni/src/main/java/javax/crypto/Cipher.java
          grep -n "PineDigestDump" android/libcore/ojluni/src/main/java/java/security/MessageDigest.java
          grep -n "PineCryptoSpecDump" android/libcore/ojluni/src/main/java/javax/crypto/spec/SecretKeySpec.java
          git -C android/libcore diff > pine-libcore-crypto-dump-applied.diff
          git -C android/external/conscrypt apply --check "$CONSCRYPT_PATCH"
          git -C android/external/conscrypt apply "$CONSCRYPT_PATCH"
          git -C android/external/conscrypt diff --check
          grep -n "PineConscryptDump" android/external/conscrypt/repackaged/common/src/main/java/com/android/org/conscrypt/PineConscryptDump.java
          grep -n "Conscrypt.TLS.write" android/external/conscrypt/repackaged/common/src/main/java/com/android/org/conscrypt/ConscryptFileDescriptorSocket.java
          grep -n "Conscrypt.EVP_CipherUpdate" android/external/conscrypt/repackaged/common/src/main/java/com/android/org/conscrypt/OpenSSLEvpCipher.java
          git -C android/external/conscrypt diff > pine-conscrypt-crypto-dump-applied.diff
          git -C android/external/boringssl apply --check "$BORINGSSL_PATCH"
          git -C android/external/boringssl apply "$BORINGSSL_PATCH"
          git -C android/external/boringssl diff --check
          grep -n "pine_boringssl_dump_record" android/external/boringssl/src/crypto/fipsmodule/pine_boringssl_dump.h
          grep -n "BoringSSL.EVP_EncryptUpdate" android/external/boringssl/src/crypto/fipsmodule/cipher/cipher.c
          grep -n "BoringSSL.HMAC_Update" android/external/boringssl/src/crypto/fipsmodule/hmac/hmac.c
          grep -n "BoringSSL.SHA512_Update" android/external/boringssl/src/crypto/fipsmodule/sha/sha512.c
          git -C android/external/boringssl diff > pine-boringssl-crypto-dump-applied.diff

      - name: Drop repo metadata before build
        run: |
          set -euo pipefail
          echo "== disk before dropping repo metadata =="
          df -h
          du -sh android/.repo 2>/dev/null || true
          rm -rf android/.repo
          echo "== disk after dropping repo metadata =="
          df -h
          echo "== android disk top-level after dropping repo metadata =="
          du -xhd1 android 2>/dev/null | sort -h | tail -40 || true

      - name: Build ART hot update targets
        timeout-minutes: 180
        env:
          LUNCH_TARGET: ${{ inputs.lunch_target }}
          BUILD_TARGETS: ${{ inputs.build_targets }}
          BUILD_JOBS: ${{ inputs.build_jobs }}
        run: |
          set -eo pipefail
          LUNCH_TARGET="${LUNCH_TARGET:-aosp_arm64-user}"
          BUILD_TARGETS="${BUILD_TARGETS:-com.android.art com.android.conscrypt}"
          BUILD_JOBS="${BUILD_JOBS:-1}"
          cd android
          export TOP="${TOP:-$PWD}"
          {
            echo "== runner resources before build =="
            df -h
            free -h || true
            nproc || true
            ccache -s || true
            echo "== workspace disk top-level =="
            du -xhd1 "$PWD" 2>/dev/null | sort -h | tail -40 || true
          } | tee ../pine-art-build.log
          set +u
          source build/envsetup.sh
          lunch "$LUNCH_TARGET"
          echo "TARGET_PRODUCT=$(get_build_var TARGET_PRODUCT)" | tee ../pine-art-build.env
          echo "TARGET_BUILD_VARIANT=$(get_build_var TARGET_BUILD_VARIANT)" | tee -a ../pine-art-build.env
          echo "PLATFORM_VERSION=$(get_build_var PLATFORM_VERSION)" | tee -a ../pine-art-build.env
          echo "BUILD_ID=$(get_build_var BUILD_ID)" | tee -a ../pine-art-build.env
          echo "PRODUCT_OUT=$(get_build_var PRODUCT_OUT)" | tee -a ../pine-art-build.env
          read -r -a targets <<< "$BUILD_TARGETS"
          echo "BUILD_TARGETS=${targets[*]}" | tee -a ../pine-art-build.env
          echo "BUILD_JOBS=$BUILD_JOBS" | tee -a ../pine-art-build.env
          echo "Starting build with ${BUILD_JOBS} jobs for targets: ${targets[*]}"
          echo "Build started at $(date)"
          set +e
          rm -f ../pine-art-build.status
          (
            build/soong/soong_ui.bash --make-mode --skip-soong-tests -j"$BUILD_JOBS" "${targets[@]}"
            echo "$?" > ../pine-art-build.status
          ) 2>&1 | tee -a ../pine-art-build.log &
          build_pid=$!
          while kill -0 "$build_pid" 2>/dev/null; do
            {
              echo "== build heartbeat $(date) =="
              free -h || true
              df -h . || true
            } | tee -a ../pine-art-build.log
            sleep 60
          done
          wait "$build_pid"
          tee_status=$?
          build_status="$(cat ../pine-art-build.status 2>/dev/null || echo "$tee_status")"
          set -e
          echo "Build completed at $(date)"
          {
            echo "== runner resources after build =="
            df -h
            free -h || true
            ccache -s || true
            echo "== android/out disk top-level =="
            du -xhd1 out 2>/dev/null | sort -h | tail -80 || true
            echo "build_status=$build_status"
          } | tee -a ../pine-art-build.log
          exit "$build_status"

      - name: Package ART hot update artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts/pine-art-hotupdate/files
          cp pine-art-build.env artifacts/pine-art-hotupdate/
          cp pine-art-revision.txt artifacts/pine-art-hotupdate/
          cp pine-art-rom-resolved-manifest.xml artifacts/pine-art-hotupdate/
          cp pine-art-rom-applied.diff artifacts/pine-art-hotupdate/
          cp pine-libcore-crypto-dump-applied.diff artifacts/pine-art-hotupdate/
          cp pine-conscrypt-crypto-dump-applied.diff artifacts/pine-art-hotupdate/
          cp pine-boringssl-crypto-dump-applied.diff artifacts/pine-art-hotupdate/
          mapfile -t apex_files < <(find android/out -type f \( -name 'com.android.art*.apex' -o -name 'com.android.runtime*.apex' -o -name 'com.android.conscrypt*.apex' \) | sort)
          if [ "${#apex_files[@]}" -eq 0 ]; then
            echo "No ART/runtime/Conscrypt APEX files produced." >&2
            find android/out -type f \( -name '*art*.apex' -o -name '*conscrypt*.apex' -o -name 'libart.so' -o -name 'libdexfile.so' -o -name 'libjavacrypto.so' -o -name 'libcrypto.so' -o -name 'libssl.so' \) | sort | head -n 200 >&2
            exit 1
          fi
          printf '%s\n' "${apex_files[@]}" > artifacts/pine-art-hotupdate/apex-files.txt
          for file in "${apex_files[@]}"; do
            cp -f "$file" artifacts/pine-art-hotupdate/files/
          done
          find android/out -type f \( -name 'libart.so' -o -name 'libartbase.so' -o -name 'libdexfile.so' -o -name 'libartpalette.so' -o -name 'libjavacrypto.so' -o -name 'libcrypto.so' -o -name 'libssl.so' \) | sort > artifacts/pine-art-hotupdate/runtime-libs.txt
          {
            echo "# pine ART and Conscrypt hot update"
            echo
            echo "ROM baseline: pine Android 12 ART tag android-12.0.0_r32"
            echo "Patch: RegisterDexFile DEX dump hook + libcore Java crypto dump hook + Conscrypt TLS/provider crypto dump hook + BoringSSL native crypto dump hook"
            echo "Crypto dump output: /data/temp/pine-crypto-dumps/<package>/java-crypto.log"
            echo "Conscrypt dump output: /data/temp/pine-crypto-dumps/<package>/conscrypt-crypto.log"
            echo "BoringSSL dump output: /data/temp/pine-crypto-dumps/<package>/boringssl-crypto.log"
            echo "Crypto dump switch: create /data/temp/pine-crypto-dump.enable; optional package filter in /data/temp/pine-crypto-dump.pkg"
            echo
            echo "Generated files:"
            sed 's#^#- #' artifacts/pine-art-hotupdate/apex-files.txt
            echo
            echo "Use devices/pine/scripts/install-pine-art-hotupdate.ps1 from this repo to push and stage the APEX on device 103."
          } > artifacts/pine-art-hotupdate/README.md
          (cd artifacts/pine-art-hotupdate && sha256sum files/* *.txt *.env *.diff *.xml README.md > SHA256SUMS)

      - name: Upload build diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pine-art-build-diagnostics
          retention-days: 7
          if-no-files-found: ignore
          path: |
            pine-art-build.log
            pine-art-build.env
            pine-art-revision.txt
            pine-art-rom-resolved-manifest.xml
            pine-art-rom-applied.diff
            pine-libcore-crypto-dump-applied.diff
            pine-conscrypt-crypto-dump-applied.diff
            pine-boringssl-crypto-dump-applied.diff

      - name: Upload ART hot update artifact
        uses: actions/upload-artifact@v4
        with:
          name: pine-art-hotupdate
          retention-days: 7
          path: artifacts/pine-art-hotupdate/
          if-no-files-found: error
